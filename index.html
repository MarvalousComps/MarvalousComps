<!DOCTYPE html>
<html>
<head>

<title>Marvalous Competitions</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#6a1bd1,#220657);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.app{
width:420px;
max-width:95%;
background:#3d1195;
border-radius:24px;
padding:25px;
box-shadow:0 20px 50px rgba(0,0,0,0.5);
text-align:center;
}

.logo{
width:230px;
margin-bottom:10px;
}

input{
width:85%;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
margin-top:10px;
text-align:center;
}

button{
background:linear-gradient(#ffd84d,#ffb300);
border:none;
padding:16px 30px;
border-radius:14px;
font-size:18px;
font-weight:bold;
margin-top:15px;
cursor:pointer;
box-shadow:0 5px 12px rgba(0,0,0,0.4);
}

.screen{
display:none;
}

.active{
display:block;
}

.pointer{
font-size:36px;
}

.wheel{
width:280px;
height:280px;
border-radius:50%;
margin:20px auto;
border:14px solid gold;

background:conic-gradient(
#ffffff 0deg 45deg,
#8c42ff 45deg 90deg,
#ffffff 90deg 135deg,
#8c42ff 135deg 180deg,
#ffffff 180deg 225deg,
#8c42ff 225deg 270deg,
#ffffff 270deg 315deg,
#8c42ff 315deg 360deg
);

display:flex;
align-items:center;
justify-content:center;

transition:transform 4s cubic-bezier(.17,.67,.32,1.35);
}

.center{
background:gold;
width:80px;
height:80px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:black;
font-size:18px;
}

.leaderboard{
background:#2a0b67;
border-radius:14px;
padding:15px;
margin-top:20px;
}

.row{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid rgba(255,255,255,0.2);
}

</style>

</head>


<body>

<div class="app">

<img src="Logo.jpg" class="logo">

<div id="startScreen" class="screen active">

<h2>Spin The Wheel</h2>

<input id="playerName" placeholder="Enter your name">

<br>

<button onclick="startGame()">Play Today's Spin</button>

</div>


<div id="gameScreen" class="screen">

<div class="pointer">⬇</div>

<div id="wheel" class="wheel">

<div class="center">SPIN</div>

</div>

<button onclick="spinWheel()">SPIN NOW</button>

</div>


<div id="resultScreen" class="screen">

<h2 id="result"></h2>

<button onclick="showLeaderboard()">View Leaderboard</button>

</div>


<div id="leaderboardScreen" class="screen">

<h2>Top Players</h2>

<div class="leaderboard">

<div id="leaderboard"></div>

</div>

<button onclick="restart()">Back</button>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCDAvHpStaZxpmELOKuXdIB5oUF90V_dL4",
  authDomain: "marvalousspin.firebaseapp.com",
  projectId: "marvalousspin",
  storageBucket: "marvalousspin.firebasestorage.app",
  messagingSenderId: "700932522616",
  appId: "1:700932522616:web:3a42098a71960894e4638d",
  measurementId: "G-3Y3TVZXKLS"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let playerName=""
let coins=0

const rewards=[0,5,10,20,50,5,15,25]

function switchScreen(screen){

document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))

document.getElementById(screen).classList.add("active")

}

window.startGame=function(){

playerName=document.getElementById("playerName").value

if(playerName==""){
alert("Enter your name")
return
}

if(localStorage.getItem("played")==new Date().toDateString()){
alert("You already played today")
return
}

switchScreen("gameScreen")

}

window.spinWheel=function(){

const wheel=document.getElementById("wheel")

let spin=3600+Math.floor(Math.random()*360)

wheel.style.transform="rotate("+spin+"deg)"

setTimeout(()=>{

let reward=rewards[Math.floor(Math.random()*rewards.length)]

coins=reward

finishGame()

},4000)

}

async function finishGame(){

localStorage.setItem("played",new Date().toDateString())

switchScreen("resultScreen")

document.getElementById("result").innerText=
playerName+" won "+coins+" coins!"

await addDoc(collection(db,"scores"),{
name:playerName,
score:coins,
time:new Date()
})

}

window.showLeaderboard=async function(){

switchScreen("leaderboardScreen")

const q=query(
collection(db,"scores"),
orderBy("score","desc"),
limit(10)
)

const snapshot=await getDocs(q)

let html=""

let i=0

snapshot.forEach(doc=>{

const p=doc.data()

let medal=""

if(i==0) medal="🥇"
else if(i==1) medal="🥈"
else if(i==2) medal="🥉"
else medal=(i+1)+"."

html+=`
<div class="row">
<span>${medal} ${p.name}</span>
<span>${p.score}</span>
</div>
`

i++

})

document.getElementById("leaderboard").innerHTML=html

}

window.restart=function(){

switchScreen("startScreen")

}

</script>

</body>
</html>
