<!DOCTYPE html>
<html>
<head>

<title>Marvalous Competitions</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta property="og:title" content="Marvalous Competitions Spin Wheel">

<meta property="og:description" content="Spin the wheel daily to win coins and climb the leaderboard!">

<meta property="og:image" content="https://marvalouscomps.github.io/MarvalousComps/wheel-preview.png">

<meta property="og:url" content="https://marvalouscomps.github.io/MarvalousComps/">

<meta property="og:type" content="website">
<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#6a1bd1,#220657);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.app{
width:420px;
max-width:95%;
background:#3d1195;
border-radius:25px;
padding:25px;
box-shadow:0 25px 60px rgba(0,0,0,0.6);
text-align:center;
}

.logo{
width:220px;
margin-bottom:10px;
}

input{
width:85%;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
margin-top:10px;
text-align:center;
}

button{
background:linear-gradient(#ffd84d,#ffb300);
border:none;
padding:16px 30px;
border-radius:14px;
font-size:18px;
font-weight:bold;
margin-top:15px;
cursor:pointer;
box-shadow:0 6px 14px rgba(0,0,0,0.4);
}

.screen{display:none}
.active{display:block}

.pointer{
width:0;
height:0;
border-left:16px solid transparent;
border-right:16px solid transparent;
border-top:26px solid gold;
margin:auto;
margin-bottom:-10px;
}

.wheelContainer{
position:relative;
width:320px;
height:320px;
margin:auto;
}

.wheelFrame{
width:320px;
position:absolute;
top:0;
left:0;
z-index:2;
}

.wheelSpin{
width:260px;
position:absolute;
top:30px;
left:30px;
z-index:1;
transition: transform 4s ease-out;
}

.center{
background:gold;
width:90px;
height:90px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:black;
font-size:20px;
}

.leaderboardPanel{
background:#5b1bb3;
border-radius:20px;
padding:15px;
margin-top:20px;
border:4px solid gold;
}

.row{
display:flex;
justify-content:space-between;
padding:10px;
margin:6px 0;
background:linear-gradient(#ffce4f,#ff9e00);
border-radius:12px;
color:black;
font-weight:bold;
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

.info{
font-size:14px;
opacity:0.9;
margin-top:-5px;
}

</style>

</head>

<body>

<div class="app">

<img src="logo2.png" class="logo">

<div id="startScreen" class="screen active">

<h2>Spin The Wheel</h2>
<p class="info">Enter your Facebook name exactly as it appears</p>

<input id="playerName" placeholder="Enter Facebook name as displayed">

<br>

<button onclick="startGame()">Play Today's Spin</button>

</div>


<div id="gameScreen" class="screen">

<div class="wheelContainer">

<img src="wheel-frame.png" class="wheelFrame">

<img id="wheel" src="wheel-inner.png" class="wheelSpin">

</div>

<button onclick="spinWheel()">SPIN NOW</button>

</div>


<div id="resultScreen" class="screen">

<h2 id="result"></h2>
<button onclick="shareWin()">Share On Facebook</button>
<button onclick="showLeaderboard()">View Leaderboard</button>
</div>
  


<div id="leaderboardScreen" class="screen">

<h2>Leaderboard</h2>

<div class="leaderboardPanel">
<div id="leaderboard"></div>
</div>

<button onclick="restart()">Back</button>

</div>

</div>


<canvas id="confetti"></canvas>

<audio id="spinSound" src="https://assets.mixkit.co/sfx/preview/mixkit-slot-machine-wheel-1934.mp3"></audio>
<audio id="winSound" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"></audio>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyCDAvHpStaZxpmELOKuXdIB5oUF90V_dL4",
authDomain: "marvalousspin.firebaseapp.com",
projectId: "marvalousspin",
storageBucket: "marvalousspin.firebasestorage.app",
messagingSenderId: "700932522616",
appId: "1:700932522616:web:3a42098a71960894e4638d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


let playerName=""
let coins=0

const rewards=[0,5,10,20,50,0,15,100]


function switchScreen(screen){

document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))

document.getElementById(screen).classList.add("active")

}


window.startGame=function(){

playerName=document.getElementById("playerName").value.trim()

if(playerName==""){
alert("Enter your Facebook name")
return
}

if(localStorage.getItem("played")==new Date().toDateString()){
alert("You already played today")
return
}

switchScreen("gameScreen")

}


window.spinWheel=function(){

document.getElementById("spinSound").play()

const wheel=document.getElementById("wheel")

let spin=3600+Math.floor(Math.random()*360)

wheel.style.transform="rotate("+spin+"deg)"

setTimeout(()=>{

let reward=rewards[Math.floor(Math.random()*rewards.length)]

coins=reward

finishGame()

},4000)

}


async function finishGame(){

localStorage.setItem("played",new Date().toDateString())

switchScreen("resultScreen")

document.getElementById("result").innerText=
playerName+" won "+coins+" coins!"

document.getElementById("winSound").play()

confetti()

await addDoc(collection(db,"scores"),{
name:playerName,
score:coins,
time:new Date()
})

}


window.showLeaderboard=async function(){

switchScreen("leaderboardScreen")

const q=query(
collection(db,"scores"),
orderBy("score","desc"),
limit(10)
)

const snapshot=await getDocs(q)

let html=""
let i=0

snapshot.forEach(doc=>{

const p=doc.data()

let medal=""

if(i==0) medal="🥇"
else if(i==1) medal="🥈"
else if(i==2) medal="🥉"
else medal=(i+1)+"."

html+=`
<div class="row">
<span>${medal} ${p.name}</span>
<span>${p.score}</span>
</div>
`

i++

})

document.getElementById("leaderboard").innerHTML=html

}


window.restart=function(){
switchScreen("startScreen")
}
window.shareWin = function(){

const text = playerName + " just won " + coins + " coins on the Marvalous Competitions spin wheel!";

const url = "https://marvalouscomps.github.io/MarvalousComps/";

const shareURL =
"https://www.facebook.com/sharer/sharer.php?u=" +
encodeURIComponent(url) +
"&quote=" +
encodeURIComponent(text);

window.open(shareURL,"_blank");

}

function confetti(){

const canvas=document.getElementById("confetti")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let pieces=[]

for(let i=0;i<120;i++){

pieces.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:5+Math.random()*5,
speed:2+Math.random()*3
})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

pieces.forEach(p=>{

ctx.fillStyle="gold"
ctx.fillRect(p.x,p.y,p.size,p.size)

p.y+=p.speed

if(p.y>canvas.height)p.y=0

})

requestAnimationFrame(draw)

}

draw()

setTimeout(()=>{ctx.clearRect(0,0,canvas.width,canvas.height)},3000)

}

</script>

</body>
</html>
