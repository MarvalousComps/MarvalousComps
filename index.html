<!DOCTYPE html>
<html>
<head>

<title>Marvalous Competitions</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#6e21d1,#2b0759);
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
}

.container{
width:420px;
max-width:95%;
}

.logo{
width:280px;
margin-bottom:10px;
}

input{
padding:12px;
width:80%;
border-radius:6px;
border:none;
margin-bottom:15px;
font-size:16px;
}

button{
background:#ffd84d;
border:none;
padding:14px 24px;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.grid{
margin-top:30px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:14px;
}

.box{
background:#1c1c1c;
border-radius:12px;
height:80px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
transition:0.2s;
}

.box:hover{
transform:scale(1.08);
}

.leaderboard{
margin-top:25px;
background:rgba(0,0,0,0.4);
padding:15px;
border-radius:12px;
}

</style>
</head>


<body>

<div class="container">

<img src="Logo.jpg" class="logo">

<div id="start">

<h2>Treasure Box Challenge</h2>

<input id="playerName" placeholder="Enter your name">

<br>

<button onclick="startGame()">Start Today's Hunt</button>

</div>

<h3 id="score"></h3>

<div id="game" class="grid"></div>

<div id="finish" style="display:none">

<h2 id="result"></h2>

<div class="leaderboard">

<h3>Top Players This Week</h3>

<div id="leaderboard"></div>

</div>

</div>

</div>


<script>

const SUPABASE_URL = "https://wqsrvwlxxhbzorgvupco.supabase.co"

const SUPABASE_KEY = "sb_publishable_w_Bd1es3ifZ7PXnxnJfc_w_dcxlmiO6eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indxc3J2d2x4eGhiem9yZ3Z1cGNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDk2ODcsImV4cCI6MjA4OTY4NTY4N30.-o8uBa0P320bK7rPV3pwwVScVM7mCAnlMMTcG_HMjEg"

const supabase = window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let coins=0
let opened=0
let playerName=""

function startGame(){

playerName=document.getElementById("playerName").value

if(playerName==""){
alert("Enter your name")
return
}

if(localStorage.getItem("played")==new Date().toDateString()){
alert("You already played today")
return
}

document.getElementById("start").style.display="none"

coins=0
opened=0

document.getElementById("score").innerText="Coins: 0"

const game=document.getElementById("game")

game.innerHTML=""

for(let i=0;i<12;i++){

let box=document.createElement("div")

box.className="box"

box.innerHTML="🎁"

box.onclick=function(){

let r=Math.random()

if(r<0.5){

box.innerHTML="🪙"
coins+=5

}
else if(r<0.7){

box.innerHTML="💰"
coins+=10

}
else{

box.innerHTML="❌"

}

opened++

document.getElementById("score").innerText="Coins: "+coins

if(opened==12){

finishGame()

}

}

game.appendChild(box)

}

}

async function finishGame(){

localStorage.setItem("played",new Date().toDateString())

document.getElementById("game").innerHTML=""

document.getElementById("result").innerText=
playerName+" collected "+coins+" coins!"

document.getElementById("finish").style.display="block"

await supabase
.from("Scores")
.insert([{name:playerName,score:coins}])

loadLeaderboard()

}

async function loadLeaderboard(){

let { data } = await supabase
.from("Scores")
.select("*")
.order("score",{ascending:false})
.limit(10)

let html=""

data.forEach((p,i)=>{

html+=(i+1)+". "+p.name+" – "+p.score+" coins<br>"

})

document.getElementById("leaderboard").innerHTML=html

}

</script>

</body>
</html>
