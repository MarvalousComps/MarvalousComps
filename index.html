<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Marvalous Competitions</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
font-family:Arial;
text-align:center;
background:linear-gradient(#6a00a8,#7a00c4);
color:white;
margin:0;
padding:30px;
}

button{
background:#ffc107;
border:none;
padding:12px 20px;
font-size:18px;
border-radius:8px;
cursor:pointer;
}

#game{
display:grid;
grid-template-columns:repeat(4,80px);
gap:15px;
justify-content:center;
margin-top:25px;
}

.chest{
font-size:40px;
cursor:pointer;
}

.leaderboard{
margin-top:30px;
}
</style>
</head>

<body>

<h1>Marvalous Competitions</h1>
<h3>Treasure Chest Challenge</h3>

<p>Open all chests and collect coins</p>
<p>You can play once per day</p>

<h3>Coins: <span id="coins">0</span></h3>

<button onclick="startGame()">Start Today's Hunt</button>

<div id="game"></div>

<div class="leaderboard">
<h3>Top 10 Players This Week</h3>
<div id="leaderboard"></div>
</div>

<script>

const supabaseUrl = "https://wqsrvwlxxhbzorgvupco.supabase.co"
const supabaseKey = "sb_publishable_w_Bd1es3ifZ7PXnxnJfc_w_dcxlmiO6"
const supabase = window.supabase.createClient(supabaseUrl,supabaseKey)

let coins = 0

function startGame(){

let lastPlay = localStorage.getItem("lastPlay")
let today = new Date().toDateString()

if(lastPlay === today){
alert("You have already played today!")
return
}

localStorage.setItem("lastPlay",today)

document.getElementById("game").innerHTML=""

coins = 0
updateCoins()

for(let i=0;i<12;i++){

let chest=document.createElement("div")
chest.className="chest"
chest.innerHTML="🧰"

chest.onclick=function(){

let reward=Math.floor(Math.random()*5)

coins+=reward

this.innerHTML="🪙"
this.onclick=null

updateCoins()

}

document.getElementById("game").appendChild(chest)

}

}

function updateCoins(){
document.getElementById("coins").innerText=coins
}

async function submitScore(){

let name=prompt("Enter your name")

let week=new Date().getWeek

await supabase
.from("scores")
.insert([{name:name,score:coins,week:week}])

loadLeaderboard()

}

async function loadLeaderboard(){

let {data}=await supabase
.from("scores")
.select("*")
.order("score",{ascending:false})
.limit(10)

let html=""

data.forEach(player=>{
html+=player.name+" - "+player.score+"<br>"
})

document.getElementById("leaderboard").innerHTML=html

}

loadLeaderboard()

</script>

</body>
</html>
