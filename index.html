<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Marvalous Competitions</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:linear-gradient(180deg,#5e1bbd,#3b0f7a);
font-family:Arial;
color:white;
text-align:center;
margin:0;
padding:0;
}

.container{
max-width:700px;
margin:auto;
padding:40px 20px;
}

.logo{
width:320px;
margin-bottom:20px;
}

button{
background:#ffd34d;
border:none;
padding:15px 25px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-top:25px;
}

.box{
background:#111;
height:80px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
}

.hidden{
display:none;
}

.leaderboard{
margin-top:30px;
background:#00000040;
padding:20px;
border-radius:15px;
}

</style>

</head>

<body>

<div class="container">

<img src="Logo.jpg" class="logo">

<h2>Mystery Box Challenge</h2>

<p>Open the boxes and collect coins</p>

<h3 id="coins">Coins: 0</h3>

<div id="startScreen">

<input id="playerName" placeholder="Enter your name"
style="padding:10px;font-size:16px;border-radius:8px;border:none">

<br><br>

<button onclick="startGame()">Start Today's Hunt</button>

</div>

<div id="gameGrid" class="grid hidden"></div>

<div id="endScreen" class="hidden">

<h2 id="result"></h2>

<p>Come back tomorrow to play again!</p>

<button onclick="showLeaderboard()">View Leaderboard</button>

</div>

<div id="leaderboard" class="leaderboard hidden">

<h2>Top Players</h2>

<div id="scores"></div>

</div>

</div>

<script>

const SUPABASE_URL = "https://wqsrvwlxxhbzorgvupco.supabase.co"
const SUPABASE_KEY = "sb_publishable_w_Bd1es3ifZ7PXnxnJfc_w_dcxlmiO6eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indxc3J2d2x4eGhiem9yZ3Z1cGNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDk2ODcsImV4cCI6MjA4OTY4NTY4N30.-o8uBa0P320bK7rPV3pwwVScVM7mCAnlMMTcG_HMjEg"

const supabaseClient = supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let coins=0
let opened=0

const rewards=[0,0,0,1,1,1,2,2,5,0,3,4]

function startGame(){

const name=document.getElementById("playerName").value

if(!name){
alert("Enter your name first")
return
}

document.getElementById("startScreen").classList.add("hidden")

const grid=document.getElementById("gameGrid")
grid.classList.remove("hidden")

shuffle(rewards)

grid.innerHTML=""

rewards.forEach(value=>{

const box=document.createElement("div")
box.className="box"
box.innerHTML="🎁"

box.onclick=()=>openBox(box,value)

grid.appendChild(box)

})

}

function openBox(box,value){

if(box.classList.contains("opened")) return

box.classList.add("opened")

opened++

if(value===0){
box.innerHTML="❌"
}else{
box.innerHTML="🪙"+value
coins+=value
document.getElementById("coins").innerText="Coins: "+coins
}

if(opened===12){
finishGame()
}

}

async function finishGame(){

document.getElementById("result").innerText="You collected "+coins+" coins!"

document.getElementById("endScreen").classList.remove("hidden")

const name=document.getElementById("playerName").value

await supabaseClient
.from("scores")
.insert([{name:name,score:coins}])

}

async function showLeaderboard(){

document.getElementById("leaderboard").classList.remove("hidden")

const {data}=await supabaseClient
.from("scores")
.select("*")
.order("score",{ascending:false})
.limit(10)

let html=""

data.forEach((p,i)=>{

html+=`<p>${i+1}. ${p.name} - ${p.score}</p>`

})

document.getElementById("scores").innerHTML=html

}

function shuffle(array){

for(let i=array.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1))

[array[i],array[j]]=[array[j],array[i]]

}

}

</script>

</body>
</html>
