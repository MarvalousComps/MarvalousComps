<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Marvalous Competitions</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(180deg,#5a00b5,#8a2be2);
color:white;
}

.gameCard{
background:#1b0033;
padding:40px;
border-radius:20px;
width:420px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

button{
background:#ffd34d;
border:none;
padding:14px 30px;
font-size:18px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
margin-top:10px;
}

#game{
display:grid;
grid-template-columns:repeat(4,90px);
gap:20px;
justify-content:center;
margin-top:25px;
}

.box{
width:90px;
height:90px;
background:#2a004d;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
font-size:38px;
cursor:pointer;
transition:transform .15s;
}

.box:active{
transform:scale(0.9);
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:flex;
align-items:center;
justify-content:center;
visibility:hidden;
}

.modalContent{
background:white;
color:black;
padding:30px;
border-radius:14px;
text-align:center;
width:280px;
}

</style>
</head>

<body>

<div class="gameCard">

<h1>Marvalous Competitions</h1>
<p>Mystery Box Challenge</p>

<h2>Coins: <span id="coins">0</span></h2>

<button onclick="startGame()">Start Today's Hunt</button>

<div id="game"></div>

</div>


<div class="modal" id="resultModal">
<div class="modalContent">

<h2 id="finalCoins"></h2>

<p>Come back tomorrow to play again!</p>

<button onclick="closeModal()">OK</button>

</div>
</div>


<script>

let coins=0
let opened=0
let total=12

function startGame(){

let lastPlay=localStorage.getItem("lastPlay")
let today=new Date().toDateString()

if(lastPlay===today){
alert("You already played today")
return
}

localStorage.setItem("lastPlay",today)

coins=0
opened=0

document.getElementById("coins").innerText=0
document.getElementById("game").innerHTML=""

for(let i=0;i<12;i++){

let box=document.createElement("div")
box.className="box"
box.innerHTML="🎁"

box.onclick=function(){

let r=Math.random()
let reward=0

if(r<0.4){
reward=0
this.innerHTML="❌"
}
else if(r<0.7){
reward=1
this.innerHTML="🪙"
}
else if(r<0.9){
reward=3
this.innerHTML="💰"
}
else{
reward=10
this.innerHTML="👑"
}

coins+=reward
opened++

document.getElementById("coins").innerText=coins

this.onclick=null

if(opened===total){
finishGame()
}

}

document.getElementById("game").appendChild(box)

}

}

function finishGame(){

document.getElementById("finalCoins").innerText=
"You collected "+coins+" coins!"

document.getElementById("resultModal").style.visibility="visible"

}

function closeModal(){

document.getElementById("resultModal").style.visibility="hidden"

}

</script>

</body>
</html>
