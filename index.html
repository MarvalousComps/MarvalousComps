<!DOCTYPE html>
<html>
<head>

<title>Marvalous Competitions</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#6e21d1,#2b0759);
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
}

.container{
width:420px;
max-width:95%;
}

.logo{
width:280px;
margin-bottom:10px;
}

input{
padding:12px;
width:80%;
border-radius:8px;
border:none;
margin-bottom:15px;
font-size:16px;
text-align:center;
}

button{
background:#ffd84d;
border:none;
padding:14px 26px;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.grid{
margin-top:30px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:14px;
}

.box{
background:#1c1c1c;
border-radius:14px;
height:85px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
cursor:pointer;
transition:0.2s;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.box:hover{
transform:scale(1.08);
}

.coin{
animation:pop 0.3s ease;
}

@keyframes pop{
0%{transform:scale(0.6)}
100%{transform:scale(1)}
}

.screen{
display:none;
}

.active{
display:block;
}

.leaderboard{
margin-top:20px;
background:rgba(0,0,0,0.4);
padding:15px;
border-radius:12px;
}

</style>
</head>

<body>

<div class="container">

<img src="Logo.jpg" class="logo">

<!-- START SCREEN -->

<div id="startScreen" class="screen active">

<h2>Treasure Box Challenge</h2>

<input id="playerName" placeholder="Enter your name">

<br>

<button onclick="startGame()">Start Today's Hunt</button>

</div>


<!-- GAME SCREEN -->

<div id="gameScreen" class="screen">

<h3 id="score">Coins: 0</h3>

<div id="game" class="grid"></div>

</div>


<!-- RESULT SCREEN -->

<div id="resultScreen" class="screen">

<h2 id="result"></h2>

<button onclick="showLeaderboard()">View Top Players</button>

</div>


<!-- LEADERBOARD SCREEN -->

<div id="leaderboardScreen" class="screen">

<h2>Top Players</h2>

<div class="leaderboard">

<div id="leaderboard"></div>

</div>

<br>

<button onclick="restartGame()">Play Again Tomorrow</button>

</div>

</div>


<script>

const SUPABASE_URL="https://wqsrvwlxxhbzorgvupco.supabase.co"

const SUPABASE_KEY="sb_publishable_w_Bd1es3ifZ7PXnxnJfc_w_dcxlmiO6eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indxc3J2d2x4eGhiem9yZ3Z1cGNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDk2ODcsImV4cCI6MjA4OTY4NTY4N30.-o8uBa0P320bK7rPV3pwwVScVM7mCAnlMMTcG_HMjEg"

const supabaseClient = window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let coins=0
let opened=0
let playerName=""

function switchScreen(screen){

document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))

document.getElementById(screen).classList.add("active")

}

function startGame(){

playerName=document.getElementById("playerName").value

if(playerName==""){
alert("Enter your name")
return
}

if(localStorage.getItem("played")==new Date().toDateString()){
alert("You already played today")
return
}

switchScreen("gameScreen")

coins=0
opened=0

document.getElementById("score").innerText="Coins: 0"

const game=document.getElementById("game")

game.innerHTML=""

for(let i=0;i<12;i++){

let box=document.createElement("div")

box.className="box"

box.innerHTML="🎁"

box.onclick=function(){

if(box.classList.contains("opened")) return

box.classList.add("opened")

let r=Math.random()

if(r<0.5){

box.innerHTML="<span class='coin'>🪙</span>"
coins+=5

}
else if(r<0.7){

box.innerHTML="<span class='coin'>💰</span>"
coins+=10

}
else{

box.innerHTML="❌"

}

opened++

document.getElementById("score").innerText="Coins: "+coins

if(opened==12){

finishGame()

}

}

game.appendChild(box)

}

}

async function finishGame(){

localStorage.setItem("played",new Date().toDateString())

switchScreen("resultScreen")

document.getElementById("result").innerText=
playerName+" collected "+coins+" coins!"

await supabaseClient
.from("scores")
.insert([{name:playerName,score:coins}])

}

async function showLeaderboard(){

switchScreen("leaderboardScreen")

let { data } = await supabaseClient
.from("scores")
.select("*")
.order("score",{ascending:false})
.limit(10)

let html=""

data.forEach((p,i)=>{

let medal=""

if(i==0) medal="🥇"
else if(i==1) medal="🥈"
else if(i==2) medal="🥉"
else medal=(i+1)+"."

html+=`
<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.2)">
<span>${medal} ${p.name}</span>
<span>${p.score}</span>
</div>
`

})

document.getElementById("leaderboard").innerHTML=html

}

function restartGame(){

switchScreen("startScreen")

}

</script>

</body>
</html>
