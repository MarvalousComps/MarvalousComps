<!DOCTYPE html>
<html>
<head>

<title>Marvalous Competitions</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#5b1dbf,#1c0647);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.container{
width:420px;
max-width:95%;
}

.logo{
width:260px;
margin-bottom:10px;
}

input{
padding:12px;
width:80%;
border-radius:8px;
border:none;
margin-bottom:20px;
font-size:16px;
text-align:center;
}

button{
background:linear-gradient(#ffd84d,#ffb300);
border:none;
padding:16px 28px;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.screen{
display:none;
}

.active{
display:block;
}

.pointer{
font-size:34px;
margin-bottom:-10px;
}

.wheel-wrapper{
position:relative;
margin:auto;
width:280px;
height:280px;
}

#wheel{
width:100%;
height:100%;
border-radius:50%;
border:12px solid gold;
background:conic-gradient(
#ffffff 0deg 45deg,
#8a39ff 45deg 90deg,
#ffffff 90deg 135deg,
#8a39ff 135deg 180deg,
#ffffff 180deg 225deg,
#8a39ff 225deg 270deg,
#ffffff 270deg 315deg,
#8a39ff 315deg 360deg
);
transition:transform 4s cubic-bezier(.17,.67,.32,1.35);
display:flex;
align-items:center;
justify-content:center;
}

.wheel-center{
width:70px;
height:70px;
background:gold;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
color:black;
font-weight:bold;
}

.leaderboard{
margin-top:20px;
background:rgba(0,0,0,0.4);
padding:15px;
border-radius:12px;
}

.row{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid rgba(255,255,255,0.2);
}

</style>
</head>


<body>

<div class="container">

<img src="Logo.jpg" class="logo">

<!-- START SCREEN -->

<div id="startScreen" class="screen active">

<h2>Spin The Wheel</h2>

<input id="playerName" placeholder="Enter your name">

<br>

<button onclick="startGame()">Play Today's Spin</button>

</div>


<!-- GAME SCREEN -->

<div id="gameScreen" class="screen">

<div class="pointer">⬇️</div>

<div class="wheel-wrapper">

<div id="wheel">

<div class="wheel-center">SPIN</div>

</div>

</div>

<br>

<button onclick="spinWheel()">SPIN NOW</button>

</div>


<!-- RESULT -->

<div id="resultScreen" class="screen">

<h2 id="result"></h2>

<button onclick="showLeaderboard()">View Top Players</button>

</div>


<!-- LEADERBOARD -->

<div id="leaderboardScreen" class="screen">

<h2>Top Players</h2>

<div class="leaderboard">

<div id="leaderboard"></div>

</div>

<br>

<button onclick="restart()">Back</button>

</div>

</div>



<script>

const SUPABASE_URL="https://wqsrvwlxxhbzorgvupco.supabase.co"

const SUPABASE_KEY="sb_publishable_w_Bd1es3ifZ7PXnxnJfc_w_dcxlmiO6eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indxc3J2d2x4eGhiem9yZ3Z1cGNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDk2ODcsImV4cCI6MjA4OTY4NTY4N30.-o8uBa0P320bK7rPV3pwwVScVM7mCAnlMMTcG_HMjEg"

const supabaseClient = window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let playerName=""
let coins=0

const rewards=[0,5,10,20,50,5,15,25]

function switchScreen(screen){

document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))

document.getElementById(screen).classList.add("active")

}


function startGame(){

playerName=document.getElementById("playerName").value

if(playerName==""){
alert("Enter your name")
return
}

if(localStorage.getItem("played")==new Date().toDateString()){
alert("You already played today")
return
}

switchScreen("gameScreen")

}


function spinWheel(){

const wheel=document.getElementById("wheel")

let spin=3600+Math.floor(Math.random()*360)

wheel.style.transform="rotate("+spin+"deg)"

setTimeout(()=>{

let reward=rewards[Math.floor(Math.random()*rewards.length)]

coins=reward

finishGame()

},4000)

}


async function finishGame(){

localStorage.setItem("played",new Date().toDateString())

switchScreen("resultScreen")

document.getElementById("result").innerText=
playerName+" won "+coins+" coins!"

await supabaseClient
.from("scores")
.insert([{name:playerName,score:coins}])

}


async function showLeaderboard(){

switchScreen("leaderboardScreen")

let { data } = await supabaseClient
.from("Scores")
.select("*")
.order("score",{ascending:false})
.limit(10)

let html=""

data.forEach((p,i)=>{

let medal=""

if(i==0) medal="🥇"
else if(i==1) medal="🥈"
else if(i==2) medal="🥉"
else medal=(i+1)+"."

html+=`
<div class="row">
<span>${medal} ${p.name}</span>
<span>${p.score}</span>
</div>
`

})

document.getElementById("leaderboard").innerHTML=html

}


function restart(){

switchScreen("startScreen")

}

</script>

</body>
</html>
