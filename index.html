<!DOCTYPE html>
<html>
<head>

<title>Marvalous Competitions</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#6a1bd1,#220657);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.app{
width:420px;
max-width:95%;
background:#3d1195;
border-radius:25px;
padding:25px;
box-shadow:0 25px 60px rgba(0,0,0,0.6);
text-align:center;
}

.logo{
width:220px;
margin-bottom:10px;
}

input{
width:85%;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
margin-top:10px;
text-align:center;
}

button{
background:linear-gradient(#ffd84d,#ffb300);
border:none;
padding:16px 30px;
border-radius:14px;
font-size:18px;
font-weight:bold;
margin-top:15px;
cursor:pointer;
box-shadow:0 6px 14px rgba(0,0,0,0.4);
}

.screen{display:none}
.active{display:block}

.pointer{
font-size:34px;
margin-bottom:-10px;
}

.wheelContainer{
position:relative;
width:320px;
margin:auto;
}

.wheelImage{
width:320px;
transition:transform 4s cubic-bezier(.17,.67,.32,1.35);
}

.spinButton{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:gold;
border:none;
border-radius:50%;
width:90px;
height:90px;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.leaderboardPanel{
background:#5b1bb3;
border-radius:20px;
padding:15px;
margin-top:20px;
border:4px solid gold;
}

.row{
display:flex;
justify-content:space-between;
padding:10px;
margin:6px 0;
background:linear-gradient(#ffce4f,#ff9e00);
border-radius:12px;
color:black;
font-weight:bold;
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

.info{
font-size:14px;
opacity:0.9;
margin-top:-5px;
}

</style>

</head>

<body>

<div class="app">

<img src="Logo.jpg" class="logo">

<div id="startScreen" class="screen active">

<h2>Spin The Wheel</h2>
<p class="info">Enter your Facebook name exactly as it appears</p>

<input id="playerName" placeholder="Enter Facebook name as displayed">

<br>

<button onclick="startGame()">Play Today's Spin</button>

</div>


<div id="gameScreen" class="screen">

<div class="pointer">▼</div>

<div class="wheelContainer">

<img id="wheel" src="wheel.png" class="wheelImage">

<button class="spinButton" onclick="spinWheel()">SPIN</button>

</div>

</div>


<div id="resultScreen" class="screen">

<h2 id="result"></h2>

<button onclick="showLeaderboard()">View Leaderboard</button>

</div>


<div id="leaderboardScreen" class="screen">

<h2>Leaderboard</h2>

<div class="leaderboardPanel">
<div id="leaderboard"></div>
</div>

<button onclick="restart()">Back</button>

</div>

</div>


<canvas id="confetti"></canvas>

<audio id="spinSound" src="https://assets.mixkit.co/sfx/preview/mixkit-slot-machine-wheel-1934.mp3"></audio>
<audio id="winSound" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs, where } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyCDAvHpStaZxpmELOKuXdIB5oUF90V_dL4",
authDomain:"marvalousspin.firebaseapp.com",
projectId:"marvalousspin",
storageBucket:"marvalousspin.firebasestorage.app",
messagingSenderId:"700932522616",
appId:"1:700932522616:web:3a42098a71960894e4638d"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let playerName=""
let coins=0

const rewards=[0,5,10,20,50,0,15,100]

const sliceAngle=360/8

function switchScreen(screen){

document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
document.getElementById(screen).classList.add("active")

}

window.startGame=function(){

playerName=document.getElementById("playerName").value.trim()

if(playerName==""){
alert("Enter your Facebook name")
return
}

if(localStorage.getItem("played")==new Date().toDateString()){
alert("You already played today")
return
}

switchScreen("gameScreen")

}

window.spinWheel=function(){

document.getElementById("spinSound").play()

const wheel=document.getElementById("wheel")

const randomSlice=Math.floor(Math.random()*8)

const rotation=3600+(randomSlice*sliceAngle)

wheel.style.transform="rotate("+rotation+"deg)"

setTimeout(()=>{

coins=rewards[randomSlice]

finishGame()

},4000)

}

function getWeekID(){

const now=new Date()
const sunday=new Date(now)

sunday.setDate(now.getDate()-now.getDay())
sunday.setHours(20,0,0,0)

if(now<sunday){
sunday.setDate(sunday.getDate()-7)
}

return sunday.toISOString().split("T")[0]

}

async function finishGame(){

localStorage.setItem("played",new Date().toDateString())

switchScreen("resultScreen")

document.getElementById("result").innerText=
playerName+" won "+coins+" coins!"

document.getElementById("winSound").play()

confetti()

await addDoc(collection(db,"scores"),{
name:playerName,
score:coins,
week:getWeekID(),
time:new Date()
})

}

window.showLeaderboard=async function(){

switchScreen("leaderboardScreen")

const q=query(
collection(db,"scores"),
where("week","==",getWeekID()),
orderBy("score","desc"),
limit(10)
)

const snapshot=await getDocs(q)

let html=""
let i=0

snapshot.forEach(doc=>{

const p=doc.data()

let medal=""

if(i==0) medal="🥇"
else if(i==1) medal="🥈"
else if(i==2) medal="🥉"
else medal=(i+1)+"."

html+=`
<div class="row">
<span>${medal} ${p.name}</span>
<span>${p.score}</span>
</div>
`

i++

})

document.getElementById("leaderboard").innerHTML=html

}

window.restart=function(){
switchScreen("startScreen")
}

function confetti(){

const canvas=document.getElementById("confetti")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

for(let i=0;i<120;i++){

ctx.fillStyle="gold"
ctx.fillRect(Math.random()*canvas.width,Math.random()*canvas.height,5,5)

}

setTimeout(()=>ctx.clearRect(0,0,canvas.width,canvas.height),2000)

}

</script>

</body>
</html>
