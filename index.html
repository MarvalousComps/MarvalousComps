<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://wqsrvwlxxhbzorgvupco.supabase.co"
const supabaseKey = "sb_publishable_w_Bd1es3ifZ7PXnxnJfc_w_dcxlmiO6"

const supabase = supabase.createClient(supabaseUrl, supabaseKey)

let coins = 0
let opened = 0
let total = 12
let playerName = ""

function startGame(){

playerName = prompt("Enter your name")

if(!playerName){
alert("Name required")
return
}

let lastPlay = localStorage.getItem("lastPlay")
let today = new Date().toDateString()

if(lastPlay === today){
alert("You already played today")
return
}

localStorage.setItem("lastPlay",today)

coins = 0
opened = 0

document.getElementById("coins").innerText = 0
document.getElementById("game").innerHTML = ""
document.getElementById("result").innerHTML = ""

for(let i=0;i<12;i++){

let box=document.createElement("div")
box.className="box"
box.innerHTML="🎁"

box.onclick=function(){

let r=Math.random()
let reward=0

if(r<0.4){
reward=0
this.innerHTML="❌"
}
else if(r<0.7){
reward=1
this.innerHTML="🪙"
}
else if(r<0.9){
reward=3
this.innerHTML="💰"
}
else{
reward=10
this.innerHTML="👑"
}

coins += reward
opened++

document.getElementById("coins").innerText = coins

this.style.background="#222"
this.onclick=null

if(opened===total){
endGame()
}

}

document.getElementById("game").appendChild(box)

}

}

async function endGame(){

let week = new Date().getWeek

await supabase
.from("scores")
.insert([{name:playerName,score:coins,week:week}])

document.getElementById("result").innerHTML =
"You collected "+coins+" coins!"

loadLeaderboard()

}

async function loadLeaderboard(){

let { data } = await supabase
.from("scores")
.select("*")
.order("score",{ascending:false})
.limit(10)

let html=""

data.forEach(p=>{
html += p.name + " - " + p.score + "<br>"
})

document.getElementById("leaderboard").innerHTML = html

}

loadLeaderboard()

</script>
