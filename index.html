<script>

let coins = 0
let opened = 0
let totalChests = 12

function startGame(){

let lastPlay = localStorage.getItem("lastPlay")
let today = new Date().toDateString()

if(lastPlay === today){
alert("You have already played today")
return
}

localStorage.setItem("lastPlay",today)

document.getElementById("game").innerHTML=""

coins = 0
opened = 0

updateCoins()

for(let i=0;i<12;i++){

let chest=document.createElement("div")
chest.className="chest"
chest.innerHTML="📦"

chest.onclick=function(){

let random = Math.random()

let reward = 0

if(random < 0.4){
reward = 0
this.innerHTML="❌"
}

else if(random < 0.7){
reward = 1
this.innerHTML="🪙"
}

else if(random < 0.9){
reward = 3
this.innerHTML="💰"
}

else{
reward = 5
this.innerHTML="🏆"
}

coins += reward

opened++

updateCoins()

this.onclick=null

if(opened === totalChests){
endGame()
}

}

document.getElementById("game").appendChild(chest)

}

}

function updateCoins(){
document.getElementById("coins").innerText = coins
}

function endGame(){

setTimeout(()=>{

alert("Game finished! You collected " + coins + " coins.")

document.getElementById("game").innerHTML=""

},500)

}

</script>
